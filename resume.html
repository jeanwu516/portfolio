<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Redirecting…</title>
<!-- Cloudflare Web Analytics -->
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "e0a894349a6c462eba03fa40b8ecd22c"}'></script>
<!-- End Cloudflare Web Analytics -->
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #ffffff;
    color: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 24px;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #1a1a1a;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
  p { margin: 0; font-size: 15px; letter-spacing: 0.01em; }
  a { color: inherit; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="dot"></div>
    <p>Taking you to my portfolio…</p>
    <p style="font-size:13px;opacity:0.55">If nothing happens, <a href="index.html">click here</a>.</p>
  </div>
  <script>
    // Wait briefly so the Cloudflare beacon records this visit before we navigate away.
    setTimeout(function () {
      window.location.replace("index.html");
    }, 600);
  </script>
</body>
</html>
